services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: staffsync-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: staffsync
      MYSQL_USER: staffsync
      MYSQL_PASSWORD: staffsync123
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staffsync-network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: staffsync-backend
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: staffsync
      MYSQL_USER: staffsync
      MYSQL_PASSWORD: staffsync123
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - staffsync-network

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: staffsync-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - staffsync-network

volumes:
  mysql_data:

networks:
  staffsync-network:
    driver: bridge
